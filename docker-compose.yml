# Local development services for Agent-Analysis.
#
# MVP storage is the local filesystem (see backend/app/storage). PostgreSQL is
# provided here for the next phase (metadata, ledger entries, run state). The
# backend service is intentionally left commented until its Dockerfile lands so
# `docker compose up` never references a missing build context.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_analysis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # backend:
  #   build: ./backend
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  #   environment:
  #     DATABASE_URL: postgresql://agent:agent@postgres:5432/agent_analysis
  #   depends_on:
  #     - postgres
  #   ports:
  #     - "8000:8000"

volumes:
  pgdata:
