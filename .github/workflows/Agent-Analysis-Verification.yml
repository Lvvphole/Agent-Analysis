name: Agent-Analysis Verification

on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: agent-analysis-verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dev dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest -q

      - name: Fetch PR base branch
        run: |
          git fetch --no-tags --prune origin \
            +refs/heads/${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Run diff check
        run: |
          git diff --check origin/${{ github.event.pull_request.base.ref }}...HEAD
